<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - POS System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <div class="text-center mb-4">
        <i class="fas fa-shopping-cart" style="font-size: 3rem; color: #3498db;"></i>
      </div>
      <h2>POS System</h2>
      <p class="text-center text-muted mb-4">আপনার অ্যাকাউন্টে লগইন করুন</p>

      <form method="POST" action="#">
        <div class="mb-3">
          <label for="email" class="form-label">ইমেইল বা ইউজারনেম</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-envelope"></i></span>
            <input type="text" class="form-control" id="email" name="email" placeholder="আপনার ইমেইল" required>
          </div>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label">পাসওয়ার্ড</label>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input type="password" class="form-control" id="password" name="password" placeholder="আপনার পাসওয়ার্ড" required>
          </div>
        </div>

        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember" name="remember">
          <label class="form-check-label" for="remember">
            মনে রাখুন
          </label>
          <a href="#" class="float-end">পাসওয়ার্ড ভুলে গেছেন?</a>
        </div>

        <button type="submit" class="btn btn-primary w-100 mb-3">
          <i class="fas fa-sign-in-alt"></i> লগইন করুন
        </button>
      </form>

      <hr>
      <p class="text-center text-muted small">
        অ্যাকাউন্ট নেই? <a href="#">এখানে যোগাযোগ করুন</a>
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
